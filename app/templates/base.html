<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}📚 Kitap Mağazası{% endblock %}</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Apple Design Palette */
      --apple-bg: #f5f5f7;
      --apple-card: rgba(255, 255, 255, 0.8);
      --apple-blue: #0071e3;
      --ink: #1d1d1f;
      --gray-text: #86868b;
      --amber: #c8831a;
    }

    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      background-color: var(--apple-bg); 
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.022em;
    }

    .brand { 
      font-family: 'Playfair Display', serif; 
      letter-spacing: -1px; 
    }

    /* Modern Glassmorphism Navbar */
    .navbar { 
      background: rgba(29, 29, 31, 0.8) !important; 
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.8rem 0;
    }

    .navbar-brand { color: var(--amber) !important; font-size: 1.5rem; }
    .nav-link { color: #ccc !important; font-weight: 500; }
    .nav-link:hover { color: var(--amber) !important; }

    /* Apple Style Glass Cards */
    .card {
      background: var(--apple-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Kitap Kapakları İçin Profesyonel Oran (2/3) */
    .book-cover {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
      background: #e8e8ed;
    }

    .btn-amber { 
      background: var(--amber); 
      color: #fff; 
      border-radius: 980px; /* Apple style rounded buttons */
      padding: 0.5rem 1.2rem;
      border: none;
      font-weight: 500;
    }
    
    .btn-amber:hover { background: #a5690f; color: #fff; opacity: 0.9; }

    /* Toast Notifications */
    #toast-box { position: fixed; bottom: 24px; right: 24px; z-index: 9999; min-width: 280px; }
    .fade-in { animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* Login Page Gradient */
    .login-wrap { 
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top right, #3b2910, #1a1208); 
    }
    .login-card { width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; border: none; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

{% block body %}{% endblock %}

<div id="toast-box"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ── Global API helper ───────────────────────────────── */
const API = {
  token:   () => localStorage.getItem('bk_token'),
  role:    () => localStorage.getItem('bk_role'),
  headers() {
    return {
      'Content-Type':  'application/json',
      'Authorization': 'Bearer ' + (this.token() || ''),
    };
  },
  async call(method, url, body) {
    const opts = { method, headers: this.headers() };
    if (body) opts.body = JSON.stringify(body);
    const r    = await fetch(url, opts);
    const data = await r.json().catch(() => ({}));
    return { ok: r.ok, status: r.status, data };
  },
};

/* ── Toast notifications ─────────────────────────────── */
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className  = `alert alert-${type === 'success' ? 'success' : 'danger'} border-0 shadow-lg fade-in mb-2`;
  el.style.borderRadius = "12px";
  el.textContent = msg;
  document.getElementById('toast-box').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

/* ── Ctrl+Alt+R → Admin Reset (Global Shortcut) ──────── */
// Capture phase (true) kullanarak tarayıcı çakışmalarını önlüyoruz
document.addEventListener('keydown', async e => {
  if (e.ctrlKey && e.altKey && (e.key === 'r' || e.key === 'R')) {
    e.preventDefault();
    e.stopPropagation();

    if (API.role() !== 'admin') return toast('Sadece admin sıfırlayabilir.', 'warning');
    if (!confirm('⚠️ Sistemi sıfırla? Tüm veri silinir.')) return;
    
    const { ok, data } = await API.call('POST', '/api/admin/reset');
    toast(
      ok
        ? `✅ Sıfırlandı — ${data.seeded?.users_count} kullanıcı, ${data.seeded?.books_count} kitap`
        : '❌ ' + data.error,
      ok ? 'success' : 'danger'
    );
    
    // UI verilerini yenilemek için sayfayı reload et veya loadBooks varsa çağır
    if (ok) {
        if (typeof loadBooks === 'function') loadBooks();
        if (typeof loadAdminStats === 'function') loadAdminStats();
    }
  }
}, true);
</script>

{% block scripts %}{% endblock %}
</body>
</html>
